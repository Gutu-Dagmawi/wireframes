<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DocuMed — Master Data Management</title>
    <link rel="stylesheet" href="../wireframe.css" />
    <script src="../wireframe.js"></script>
  </head>
  <body>

          activeId: "master_data_management",

      <div id="tab-services" class="wf-tab-content active">

              "ETB 350.00",
              "Main Branch",
              '<span class="wf-badge green">Active</span>',
              '<button class="wf-btn small danger">Deactivate</button>',
            ],
          ],
          { clickable: true },
        )}

        <div class="wf-filter-bar">
          <div class="filter-group">
            <input type="text" class="wf-input" placeholder="Search lab tests..." style="width:250px;">

          <a href="catalog_item_form.html"><button class="wf-btn primary small">+ Add Test</button></a>

          [
            "Test Name",
            "Specimen Type",
            "Price",
            "In-House Branches",
            "Status",

          ["Drug Name", "Dosage Forms", "Strengths", "Status", "Actions"],

              '<button class="wf-btn small danger">Deactivate</button>',

              "5mg, 10mg",
              '<span class="wf-badge green">Active</span>',
              '<button class="wf-btn small danger">Deactivate</button>',

              "Diclofenac",

              '<button class="wf-btn small danger">Deactivate</button>',

              "Paracetamol",

              '<button class="wf-btn small danger">Deactivate</button>',

</html>
