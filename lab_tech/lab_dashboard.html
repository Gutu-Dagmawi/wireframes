<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DocuMed — Lab Dashboard</title>
    <link rel="stylesheet" href="../wireframe.css" />
    <script src="../wireframe.js"></script>
  </head>
  <body>
    <script>
      ready(() => {
        renderPageShell({
          title: "Lab Dashboard",
          role: "lab_tech",
          activeId: "lab_dashboard",
          screenId: "SCR_lab_dashboard",
          workflow: "Entry Flow",
          userName: "Daniel A. (Lab Tech)",

          <label>Order Mode:</label>
          <select class="wf-input" style="width:160px;">
            <option>All</option><option>In-House</option><option>External Referral</option>

        <div class="filter-group">
          <label>Search:</label>
          <input type="text" class="wf-input" placeholder="Patient name..." style="width:180px;">
        </div>
      </div>

      ${renderTable(
        [
          "Patient Name",
          "Ordering Practitioner",
          "Tests Ordered",
          "Order Mode",
          "Order Timestamp",
          "Status",
        ],
        [
          [
            '<a href="lab_order_detail.html"><strong>Meron Hailu</strong></a>',

            "CBC, Lipid Profile",
            '<span class="wf-badge green">In-House</span>',
            "08 Apr, 09:45",
            '<span class="wf-badge">Ready for Processing</span>',
          ],
          [

            "Dr. Alem B.",
            "Blood Glucose, HbA1c",
            '<span class="wf-badge green">In-House</span>',
            "08 Apr, 10:00",

          ],
          [
            '<a href="lab_order_detail.html"><strong>Abebe Kebede</strong></a>',
            "Dr. Solomon T.",
            "Renal Function Panel",
            '<span class="wf-badge green">In-House</span>',

            '<span class="wf-badge orange">External</span>',
            "08 Apr, 10:50",
            '<span class="wf-badge">Ready for Processing</span>',
          ],
        ],
        { clickable: true },
      )}
      <p class="text-small text-muted">Click a row to open <a href="lab_order_detail.html">Lab Order Detail</a>. Queue auto-refreshes as new payment-confirmed orders arrive.</p>
    `,
        });
      });
    </script>

</html>
