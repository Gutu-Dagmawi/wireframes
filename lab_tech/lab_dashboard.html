<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DocuMed — Lab Dashboard</title>
    <link rel="stylesheet" href="../wireframe.css" />
    <script src="../wireframe.js"></script>
  </head>
  <body>
    <script>
      ready(() => {
        renderPageShell({
          title: "Lab Dashboard",
          role: "lab_tech",
          activeId: "lab_dashboard",
          screenId: "SCR_lab_dashboard",
          workflow: "Entry Flow",
          userName: "Daniel A. (Lab Tech)",
          content: `
      <h2 class="page-title">Lab Dashboard</h2>

      <div class="wf-summary-bar">
        <div class="summary-item"><strong>Total Orders:</strong> 5</div>
        <div class="summary-item"><strong>Awaiting Specimen:</strong> 2</div>
        <div class="summary-item"><strong>In Progress:</strong> 1</div>
        <div class="summary-item"><strong>Completed Today:</strong> 2</div>
      </div>

      <div class="wf-filter-bar">
        <div class="filter-group">
          <label>Status:</label>
          <select class="wf-input" style="width:180px;">
            <option>All</option><option>Awaiting Specimen</option><option>In Progress</option><option>Completed</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Order Source:</label>
          <select class="wf-input" style="width:160px;">
            <option>All Sources</option><option>Practitioner</option><option>Special Service</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Search:</label>
          <input type="text" class="wf-input" placeholder="Patient name or MRN..." style="width:200px;">
        </div>
      </div>

      ${renderTable(
        [
          "MRN",
          "Patient Name",
          "Order Source",
          "Tests Ordered",
          "Order Timestamp",
          "Status",
          "Result Destination",
        ],
        [
          [
            "MRN-0091",
            '<a href="lab_order_detail.html"><strong>Meron Hailu</strong></a> <span style="display:none;">🔴 Red</span>',
            '<span class="wf-badge gray">Practitioner</span> Dr. Solomon T.',
            "CBC, Lipid Profile",
            "10 Apr, 09:45",
            '<span class="wf-badge">Awaiting Specimen</span>',
            '<span class="text-small text-muted">→ Dr. Solomon T.</span>',
          ],
          [
            "MRN-0023",
            '<a href="lab_order_detail.html"><strong>Dawit Tadesse</strong></a> <span style="display:none;">🟢 Green</span>',
            '<span class="wf-badge gray">Practitioner</span> Dr. Alem B.',
            "Blood Glucose, HbA1c",
            "10 Apr, 10:00",
            '<span class="wf-badge blue">In Progress</span>',
            '<span class="text-small text-muted">→ Dr. Alem B.</span>',
          ],
          [
            "MRN-0015",
            '<a href="lab_order_detail.html"><strong>Abebe Kebede</strong></a> <span style="display:none;">🔴 Red</span>',
            '<span class="wf-badge gray">Practitioner</span> Dr. Solomon T.',
            "Renal Function Panel",
            "10 Apr, 10:30",
            '<span class="wf-badge">Awaiting Specimen</span>',
            '<span class="text-small text-muted">→ Dr. Solomon T.</span>',
          ],
          [
            "MRN-0078",
            '<a href="lab_order_detail.html"><strong>Fatima Ali</strong></a> <span style="display:none;">🟡 Yellow</span>',
            '<span class="wf-badge" style="background:#e8f5e9;color:#2e7d32;">Special Service</span> SSO-002',
            "Blood Glucose (Fasting) [FBS]",
            "10 Apr, 10:30",
            '<span class="wf-badge">Awaiting Specimen</span>',
            '<span class="text-small text-muted">→ Receptionist (Hana G.)</span>',
          ],
          [
            "MRN-0042",
            '<a href="lab_order_detail.html"><strong>Tigist Mekonnen</strong></a> <span style="display:none;">🟡 Yellow</span>',
            '<span class="wf-badge gray">Practitioner</span> Dr. Alem B.',
            "ESR",
            "10 Apr, 08:30",
            '<span class="wf-badge green">Completed</span>',
            '<span class="text-small text-muted">→ Dr. Alem B. (delivered)</span>',
          ],
        ],
        { clickable: true },
      )}
      <p class="text-small text-muted">Click a row to open <a href="lab_order_detail.html">Lab Order Detail</a>. Lab tech handles <strong>in-house tests only</strong>. External referrals are managed by the ordering practitioner. On completion, results are sent to the order source.</p>
    `,
        });
      });
    </script>
  </body>
</html>
