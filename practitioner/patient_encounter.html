<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DocuMed — Patient Encounter</title>
    <link rel="stylesheet" href="../wireframe.css" />
    <script src="../wireframe.js"></script>
  </head>
  <body>
    <script>
      ready(() => {
        renderPageShell({
          title: "Patient Encounter",
          role: "practitioner",
          activeId: "patient_encounter",
          screenId: "SCR_patient_encounter",
          workflow: "Session Flow",
          userName: "Dr. Solomon T.",
          content: function (main) {
            main.innerHTML = `
      <!-- Patient Header (persistent) -->
      <div class="wf-patient-header">
        <div class="ph-top-row">
          <div class="ph-name">Abebe Kebede</div>
          <div class="ph-visit-badge">📅 Visit: 08 Apr 2026 · Encounter #E-2026-0412</div>
        </div>

        <div class="ph-meta">
          <div class="ph-meta-item">
            <span class="meta-label">Sex / Age</span>
            Male, 41 yrs
          </div>
          <div class="ph-meta-item">
            <span class="meta-label">Date of Birth</span>
            12 Mar 1985
          </div>
          <div class="ph-meta-item">
            <span class="meta-label">Patient ID</span>
            ET-1234567
          </div>
          <div class="ph-meta-item">
            <span class="meta-label">Phone</span>
            0911-234-567
          </div>
          <div class="ph-meta-item">
            <span class="meta-label">Assigned Practitioner</span>
            Dr. Solomon T. (General Practice)
          </div>
          <div class="ph-meta-item">
            <span class="meta-label">Known Allergies</span>
            <span class="wf-tag" style="font-size:.72rem;border-color:#a44;color:#a44;background:#ffefef;">⚠ Penicillin</span>
            <span class="wf-tag" style="font-size:.72rem;border-color:#a44;color:#a44;background:#ffefef;">⚠ Peanuts</span>
          </div>
          <div class="ph-meta-item">
            <span class="meta-label">Current Medications</span>
            <span class="wf-tag" style="font-size:.72rem;">Amlodipine 5mg</span>
            <span class="wf-tag" style="font-size:.72rem;">Metformin 500mg</span>
          </div>
        </div>

        <div class="ph-complaint">
          <div class="complaint-label">⚡ Chief Complaint</div>
          <div class="complaint-text">Persistent headache for 3 days, mainly frontal. Worse in the morning. Pain score: 4/10. Location: Frontal region, bilateral.</div>
        </div>

        <div class="ph-vitals">
          <div class="vital-chip warn">
            <span class="vital-label">BP</span>
            <span class="vital-value">130/85</span>
            <span style="font-size:.65rem;color:#b85;">↑</span>
          </div>
          <div class="vital-chip">
            <span class="vital-label">Temp</span>
            <span class="vital-value">36.8°C</span>
          </div>
          <div class="vital-chip">
            <span class="vital-label">Pulse</span>
            <span class="vital-value">78 bpm</span>
          </div>
          <div class="vital-chip">
            <span class="vital-label">RR</span>
            <span class="vital-value">16/min</span>
          </div>
          <div class="vital-chip">
            <span class="vital-label">SpO₂</span>
            <span class="vital-value">97%</span>
          </div>
          <div class="vital-chip">
            <span class="vital-label">Wt</span>
            <span class="vital-value">70 kg</span>
          </div>
          <div class="vital-chip">
            <span class="vital-label">Ht</span>
            <span class="vital-value">175 cm</span>
          </div>
          <div class="vital-chip">
            <span class="vital-label">BMI</span>
            <span class="vital-value">22.9</span>
          </div>
        </div>

        <!-- Triage Source Info -->
        <div style="margin-top:10px;padding-top:8px;border-top:1px dashed #ccc;display:flex;gap:20px;flex-wrap:wrap;font-size:.78rem;color:#888;">
          <span>🏥 <strong style="color:#555;">Vitals taken by:</strong> Selam D. (Nurse)</span>
          <span>🕐 <strong style="color:#555;">Triage completed:</strong> 08 Apr 2026, 09:15 AM</span>
        </div>
      </div>

      <!-- Action Buttons Row -->
      <div class="wf-action-bar between mb-2">
        <div class="flex gap-1">
          <a href="referral_form.html"><button class="wf-btn small">↗ Create Referral</button></a>
          <a href="schedule_appointment.html"><button class="wf-btn small">📅 Schedule Follow-Up</button></a>
        </div>
        <div class="flex gap-1">
          <button class="wf-btn" style="background:#fff3e0;color:#e65100;border-color:#ffb74d;" onclick="document.getElementById('suspend-panel').style.display='block';document.getElementById('encounter-summary').style.display='none'">Suspend Encounter</button>
          <button class="wf-btn primary" onclick="document.getElementById('encounter-summary').style.display='block';document.getElementById('suspend-panel').style.display='none'">✓ Finalise Encounter</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="wf-tabs">
        <div class="tab active" data-tab="tab-profile">Patient Profile</div>
        <div class="tab" data-tab="tab-encounter">Encounter Form</div>
        <div class="tab" data-tab="tab-laborder">Lab Order</div>
        <div class="tab" data-tab="tab-ordersheet">Order-Sheet</div>
        <div class="tab" data-tab="tab-prescription">Prescription</div>
      </div>

      <!-- Tab 1: Patient Profile (longitudinal, editable within encounter) -->
      <div id="tab-profile" class="wf-tab-content active">
        <div class="wf-action-bar between mb-2">
          <span class="text-small text-muted">Longitudinal patient record — editable during encounter. All changes are version-tracked.</span>
          <a href="../shared/patient_profile.html"><button class="wf-btn small">Open Full Profile &rarr;</button></a>
        </div>

        <!-- Emergency Contact -->
        <div class="wf-card" style="margin-bottom:12px;">
          <div class="card-title flex-between">
            <span>Emergency Contact</span>
            <button class="wf-btn small" onclick="toggleEdit(this, 'ec-view', 'ec-edit')">&#9998; Edit</button>
          </div>
          <!-- View Mode -->
          <div id="ec-view">
            <div class="wf-kv-grid">
              <div class="wf-kv"><div class="kv-label">Contact Name</div><div class="kv-value">Tigist Kebede</div></div>
              <div class="wf-kv"><div class="kv-label">Relationship</div><div class="kv-value">Spouse</div></div>
              <div class="wf-kv"><div class="kv-label">Phone</div><div class="kv-value">0922-111-222</div></div>
            </div>
          </div>
          <!-- Edit Mode -->
          <div id="ec-edit" style="display:none;">
            <div class="wf-form-row">
              <div class="wf-form-group"><label>Contact Name</label><input class="wf-input" value="Tigist Kebede"></div>
              <div class="wf-form-group"><label>Relationship</label>
                <select class="wf-input"><option selected>Spouse</option><option>Parent</option><option>Sibling</option><option>Child</option><option>Friend</option><option>Other</option></select>
              </div>
              <div class="wf-form-group"><label>Phone</label><input class="wf-input" value="0922-111-222"></div>
            </div>
            <div class="wf-action-bar" style="margin-top:8px;">
              <button class="wf-btn primary small" onclick="toggleEdit(this.closest('.wf-card').querySelector('.wf-btn.small'), 'ec-view', 'ec-edit')">Save</button>
              <button class="wf-btn small" onclick="toggleEdit(this.closest('.wf-card').querySelector('.card-title .wf-btn'), 'ec-view', 'ec-edit')">Cancel</button>
            </div>
          </div>
        </div>

        <!-- Medical Background -->
        <div class="wf-grid-2">
          <!-- PMH -->
          <div class="wf-form-section">
            <div class="section-title flex-between" style="display:flex;justify-content:space-between;align-items:center;">
              <span>Past Medical History (PMH)</span>
              <button class="wf-btn small" style="border-bottom:none;" onclick="toggleEdit(this, 'pmh-view', 'pmh-edit')">&#9998; Edit</button>
            </div>
            <div id="pmh-view">
              ${renderTable(
                ['Condition', 'Year', 'Status'],
                [
                  ['Hypertension', '2024', '<span class="wf-badge orange">Active</span>'],
                  ['Pre-diabetes', '2025', '<span class="wf-badge orange">Active</span>'],
                  ['Malaria', '2020', '<span class="wf-badge green">Resolved</span>'],
                  ['Typhoid Fever', '2018', '<span class="wf-badge green">Resolved</span>'],
                ]
              )}
            </div>
            <div id="pmh-edit" style="display:none;">
              <div class="wf-form-group" style="margin-bottom:6px;">
                <label class="text-small">Hypertension (2024)</label>
                <div style="display:flex;gap:6px;"><input class="wf-input" value="Hypertension" style="flex:2;"><input class="wf-input" value="2024" style="flex:1;"><select class="wf-input" style="flex:1;"><option selected>Active</option><option>Resolved</option><option>Managed</option></select></div>
              </div>
              <div class="wf-form-group" style="margin-bottom:6px;">
                <label class="text-small">Pre-diabetes (2025)</label>
                <div style="display:flex;gap:6px;"><input class="wf-input" value="Pre-diabetes" style="flex:2;"><input class="wf-input" value="2025" style="flex:1;"><select class="wf-input" style="flex:1;"><option selected>Active</option><option>Resolved</option><option>Managed</option></select></div>
              </div>
              <div class="wf-form-group" style="margin-bottom:6px;">
                <label class="text-small">Malaria (2020)</label>
                <div style="display:flex;gap:6px;"><input class="wf-input" value="Malaria" style="flex:2;"><input class="wf-input" value="2020" style="flex:1;"><select class="wf-input" style="flex:1;"><option>Active</option><option selected>Resolved</option><option>Managed</option></select></div>
              </div>
              <div class="wf-form-group" style="margin-bottom:6px;">
                <label class="text-small">Typhoid Fever (2018)</label>
                <div style="display:flex;gap:6px;"><input class="wf-input" value="Typhoid Fever" style="flex:2;"><input class="wf-input" value="2018" style="flex:1;"><select class="wf-input" style="flex:1;"><option>Active</option><option selected>Resolved</option><option>Managed</option></select></div>
              </div>
              <button class="wf-btn small" style="margin-top:4px;">+ Add Condition</button>
              <div class="wf-action-bar" style="margin-top:8px;">
                <button class="wf-btn primary small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'pmh-view', 'pmh-edit')">Save</button>
                <button class="wf-btn small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'pmh-view', 'pmh-edit')">Cancel</button>
              </div>
            </div>
          </div>

          <!-- PSH -->
          <div class="wf-form-section">
            <div class="section-title flex-between" style="display:flex;justify-content:space-between;align-items:center;">
              <span>Past Surgical History (PSH)</span>
              <button class="wf-btn small" style="border-bottom:none;" onclick="toggleEdit(this, 'psh-view', 'psh-edit')">&#9998; Edit</button>
            </div>
            <div id="psh-view">
              ${renderTable(
                ['Procedure', 'Date', 'Notes'],
                [
                  ['Appendectomy', 'Mar 2015', 'Laparoscopic, no complications'],
                ]
              )}
            </div>
            <div id="psh-edit" style="display:none;">
              <div class="wf-form-group" style="margin-bottom:6px;">
                <label class="text-small">Appendectomy</label>
                <div style="display:flex;gap:6px;"><input class="wf-input" value="Appendectomy" style="flex:2;"><input class="wf-input" value="Mar 2015" style="flex:1;"><input class="wf-input" value="Laparoscopic, no complications" style="flex:2;"></div>
              </div>
              <button class="wf-btn small" style="margin-top:4px;">+ Add Procedure</button>
              <div class="wf-action-bar" style="margin-top:8px;">
                <button class="wf-btn primary small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'psh-view', 'psh-edit')">Save</button>
                <button class="wf-btn small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'psh-view', 'psh-edit')">Cancel</button>
              </div>
            </div>
          </div>
        </div>

        <div class="wf-grid-2">
          <!-- Family History -->
          <div class="wf-form-section">
            <div class="section-title flex-between" style="display:flex;justify-content:space-between;align-items:center;">
              <span>Family History</span>
              <button class="wf-btn small" style="border-bottom:none;" onclick="toggleEdit(this, 'fh-view', 'fh-edit')">&#9998; Edit</button>
            </div>
            <div id="fh-view">
              ${renderTable(
                ['Relation', 'Condition', 'Notes'],
                [
                  ['Father', 'Type 2 Diabetes', 'Diagnosed age 50'],
                  ['Father', 'Hypertension', 'On medication'],
                  ['Mother', 'Asthma', 'Childhood onset'],
                ]
              )}
            </div>
            <div id="fh-edit" style="display:none;">
              <div class="wf-form-group" style="margin-bottom:6px;">
                <div style="display:flex;gap:6px;"><select class="wf-input" style="flex:1;"><option selected>Father</option><option>Mother</option><option>Sibling</option><option>Other</option></select><input class="wf-input" value="Type 2 Diabetes" style="flex:2;"><input class="wf-input" value="Diagnosed age 50" style="flex:2;"></div>
              </div>
              <div class="wf-form-group" style="margin-bottom:6px;">
                <div style="display:flex;gap:6px;"><select class="wf-input" style="flex:1;"><option selected>Father</option><option>Mother</option><option>Sibling</option><option>Other</option></select><input class="wf-input" value="Hypertension" style="flex:2;"><input class="wf-input" value="On medication" style="flex:2;"></div>
              </div>
              <div class="wf-form-group" style="margin-bottom:6px;">
                <div style="display:flex;gap:6px;"><select class="wf-input" style="flex:1;"><option>Father</option><option selected>Mother</option><option>Sibling</option><option>Other</option></select><input class="wf-input" value="Asthma" style="flex:2;"><input class="wf-input" value="Childhood onset" style="flex:2;"></div>
              </div>
              <button class="wf-btn small" style="margin-top:4px;">+ Add Entry</button>
              <div class="wf-action-bar" style="margin-top:8px;">
                <button class="wf-btn primary small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'fh-view', 'fh-edit')">Save</button>
                <button class="wf-btn small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'fh-view', 'fh-edit')">Cancel</button>
              </div>
            </div>
          </div>

          <!-- Social History -->
          <div class="wf-form-section">
            <div class="section-title flex-between" style="display:flex;justify-content:space-between;align-items:center;">
              <span>Social History</span>
              <button class="wf-btn small" style="border-bottom:none;" onclick="toggleEdit(this, 'sh-view', 'sh-edit')">&#9998; Edit</button>
            </div>
            <div id="sh-view">
              <div class="wf-kv-grid">
                <div class="wf-kv"><div class="kv-label">Smoking</div><div class="kv-value">Never</div></div>
                <div class="wf-kv"><div class="kv-label">Alcohol</div><div class="kv-value">Occasional</div></div>
                <div class="wf-kv"><div class="kv-label">Occupation</div><div class="kv-value">Software Engineer</div></div>
                <div class="wf-kv"><div class="kv-label">Lifestyle</div><div class="kv-value">Sedentary work; recent stress</div></div>
              </div>
            </div>
            <div id="sh-edit" style="display:none;">
              <div class="wf-form-row">
                <div class="wf-form-group"><label>Smoking Status</label>
                  <select class="wf-input"><option selected>Never</option><option>Former</option><option>Current</option></select>
                </div>
                <div class="wf-form-group"><label>Alcohol Use</label>
                  <select class="wf-input"><option>None</option><option selected>Occasional</option><option>Regular</option></select>
                </div>
              </div>
              <div class="wf-form-row">
                <div class="wf-form-group"><label>Occupation</label><input class="wf-input" value="Software Engineer"></div>
                <div class="wf-form-group"><label>Lifestyle Notes</label><textarea class="wf-input" rows="2">Sedentary work; recent stress</textarea></div>
              </div>
              <div class="wf-action-bar" style="margin-top:8px;">
                <button class="wf-btn primary small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'sh-view', 'sh-edit')">Save</button>
                <button class="wf-btn small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'sh-view', 'sh-edit')">Cancel</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Ongoing Clinical Data -->
        <div class="wf-grid-2">
          <!-- Active Problem List -->
          <div class="wf-form-section">
            <div class="section-title flex-between" style="display:flex;justify-content:space-between;align-items:center;">
              <span>Active Problem List</span>
              <button class="wf-btn small" style="border-bottom:none;" onclick="toggleEdit(this, 'apl-view', 'apl-edit')">&#9998; Edit</button>
            </div>
            <div id="apl-view">
              <ul style="list-style:disc;padding-left:18px;font-size:.9rem;color:#555;">
                <li>Hypertension Stage 1 (diagnosed Jun 2024) &mdash; <span class="wf-badge orange" style="font-size:.7rem;">Active</span></li>
                <li>Pre-diabetes (diagnosed Jan 2025) &mdash; <span class="wf-badge orange" style="font-size:.7rem;">Monitoring</span></li>
              </ul>
            </div>
            <div id="apl-edit" style="display:none;">
              <div class="wf-form-group" style="margin-bottom:6px;">
                <div style="display:flex;gap:6px;align-items:center;"><input class="wf-input" value="Hypertension Stage 1" style="flex:2;"><input class="wf-input" value="Jun 2024" style="flex:1;"><select class="wf-input" style="flex:1;"><option selected>Active</option><option>In Remission</option><option>Monitoring</option><option>Resolved</option></select></div>
              </div>
              <div class="wf-form-group" style="margin-bottom:6px;">
                <div style="display:flex;gap:6px;align-items:center;"><input class="wf-input" value="Pre-diabetes" style="flex:2;"><input class="wf-input" value="Jan 2025" style="flex:1;"><select class="wf-input" style="flex:1;"><option>Active</option><option>In Remission</option><option selected>Monitoring</option><option>Resolved</option></select></div>
              </div>
              <button class="wf-btn small" style="margin-top:4px;">+ Add Condition</button>
              <div class="wf-action-bar" style="margin-top:8px;">
                <button class="wf-btn primary small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'apl-view', 'apl-edit')">Save</button>
                <button class="wf-btn small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'apl-view', 'apl-edit')">Cancel</button>
              </div>
            </div>
          </div>

          <!-- Allergies -->
          <div class="wf-form-section">
            <div class="section-title flex-between" style="display:flex;justify-content:space-between;align-items:center;">
              <span>Known Allergies</span>
              <button class="wf-btn small" style="border-bottom:none;" onclick="toggleEdit(this, 'alg-view', 'alg-edit')">&#9998; Edit</button>
            </div>
            <div id="alg-view">
              <div class="flex gap-1" style="flex-wrap:wrap;">
                <span class="wf-tag" style="border-color:#a44;color:#a44;background:#ffefef;">Penicillin &mdash; Severe</span>
                <span class="wf-tag" style="border-color:#b85;color:#b85;background:#fff8ef;">Peanuts &mdash; Moderate</span>
              </div>
            </div>
            <div id="alg-edit" style="display:none;">
              <div class="wf-form-group" style="margin-bottom:6px;">
                <div style="display:flex;gap:6px;"><input class="wf-input" value="Penicillin" style="flex:2;"><select class="wf-input" style="flex:1;"><option selected>Drug</option><option>Food</option><option>Environmental</option></select><input class="wf-input" value="Rash, urticaria" style="flex:2;" placeholder="Reaction"><select class="wf-input" style="flex:1;"><option>Mild</option><option>Moderate</option><option selected>Severe</option><option>Life-threatening</option></select></div>
              </div>
              <div class="wf-form-group" style="margin-bottom:6px;">
                <div style="display:flex;gap:6px;"><input class="wf-input" value="Peanuts" style="flex:2;"><select class="wf-input" style="flex:1;"><option>Drug</option><option selected>Food</option><option>Environmental</option></select><input class="wf-input" value="Oral itching, swelling" style="flex:2;" placeholder="Reaction"><select class="wf-input" style="flex:1;"><option>Mild</option><option selected>Moderate</option><option>Severe</option><option>Life-threatening</option></select></div>
              </div>
              <button class="wf-btn small" style="margin-top:4px;">+ Add Allergy</button>
              <div class="wf-action-bar" style="margin-top:8px;">
                <button class="wf-btn primary small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'alg-view', 'alg-edit')">Save</button>
                <button class="wf-btn small" onclick="toggleEdit(this.closest('.wf-form-section').querySelector('.section-title .wf-btn'), 'alg-view', 'alg-edit')">Cancel</button>
              </div>
            </div>
          </div>
        </div>

        <div class="wf-grid-2">
          <!-- Current Medications -->
          <div class="wf-form-section">
            <div class="section-title flex-between" style="display:flex;justify-content:space-between;align-items:center;">
              <span>Current Medications</span>
              <button class="wf-btn small" style="border-bottom:none;" onclick="toggleEdit(this, 'med-view', 'med-edit')">&#9998; Edit</button>
            </div>
            <div id="med-view">
              ${renderTable(
                ['Drug', 'Dosage', 'Frequency', 'Started', 'Ended', 'Status'],
                [
                  ['Amlodipine', '5mg', 'Once daily', '15 Jun 2024', '&mdash;', '<span class="wf-badge green">Active</span>'],
                  ['Metformin', '500mg', 'Twice daily', '20 Jan 2025', '&mdash;', '<span class="wf-badge green">Active</span>'],
                  ['Amoxicillin', '500mg', 'TDS x 5 days', '20 Feb 2026', '25 Feb 2026', '<span class="wf-badge gray">Completed</span>'],
                  ['Lisinopril', '10mg', 'Once daily', '10 Mar 2024', '14 Jun 2024', '<span class="wf-badge red">Discontinued</span>'],
                ]
              )}
            </div>
            <div id="med-edit" style="display:none;">
              <div class="wf-form-group" style="margin-bottom:6px;">
                <label class="text-small" style="font-weight:600;margin-bottom:4px;">Amlodipine <span class="wf-badge green" style="font-size:.65rem;">Active</span></label>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                  <input class="wf-input" value="Amlodipine" style="flex:2;min-width:100px;" readonly>
                  <input class="wf-input" value="5mg" style="flex:1;min-width:50px;" placeholder="Dosage">
                  <input class="wf-input" value="Once daily" style="flex:1;min-width:70px;" placeholder="Frequency">
                  <div style="flex:1;min-width:100px;"><label class="text-small" style="font-size:.65rem;color:#888;">Started</label><input class="wf-input" type="date" value="2024-06-15"></div>
                  <div style="flex:1;min-width:100px;"><label class="text-small" style="font-size:.65rem;color:#888;">Ended</label><input class="wf-input" type="date" value="" placeholder="Still active"></div>
                  <select class="wf-input" style="flex:1;min-width:90px;"><option selected>Active</option><option>Discontinued</option><option>On Hold</option><option>Completed</option></select>
                </div>
              </div>
              <div class="wf-form-group" style="margin-bottom:6px;">
                <label class="text-small" style="font-weight:600;margin-bottom:4px;">Metformin <span class="wf-badge green" style="font-size:.65rem;">Active</span></label>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">

      function filterMedDrugs(query) {

        const q = query.toLowerCase();
        const matches = DRUG_FORMULARY.filter(d => d.name.toLowerCase().includes(q)).slice(0, 8);
        if (matches.length === 0) {
          dropdown.innerHTML = '<div style="padding:8px;color:#999;font-size:.82rem;">No drugs found</div>';
        } else {
          dropdown.innerHTML = matches.map(d => {
            const hl = d.name.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<strong>$1</strong>');

      function refreshLabTags() {
        const container = document.getElementById("lab-selected-tags");
        if (!container) return;
        const items = document.querySelectorAll('#lab-test-picker .lab-test-item');
        let html = "";
        items.forEach(item => {

            const name = cb.getAttribute('data-name') || cb.value;
            const specCbs = item.querySelectorAll('.lab-specimen-select .spec-cb');
            const rawSpecimen = cb.getAttribute('data-specimen') || '';
            let specimen = '';
            if (specCbs.length > 0) {
              const checked = [];
              specCbs.forEach(s => { if (s.checked) checked.push(s.parentElement.textContent.trim()); });
              specimen = checked.join(', ');
            } else {
              specimen = rawSpecimen.includes(',') ? rawSpecimen.split(',')[0] : rawSpecimen;

            html += '<span class="wf-tag" style="display:inline-flex;align-items:center;gap:4px;">' +

        const matches = DRUG_FORMULARY.filter(
          (d) =>
            d.name.toLowerCase().includes(q) ||
            d.category.toLowerCase().includes(q) ||
            d.forms.toLowerCase().includes(q),
        );
        if (matches.length === 0) {
          dd.innerHTML =
            '<div style="padding:10px;color:#999;font-size:.85rem;font-style:italic;">No matching drugs found</div>';
        } else {
          dd.innerHTML = matches
            .map(
              (d) =>
                '<div class="drug-option" onclick="selectDrug(\'' +
                d.name.replace(/'/g, "\\'") +
                '\')" style="padding:6px 10px;cursor:pointer;border-bottom:1px solid #eee;font-size:.85rem;">' +
                "<strong>" +
                highlightMatch(d.name, q) +
                "</strong>" +
                '<span style="color:#888;margin-left:8px;">' +
                d.forms +
                "</span>" +
                '<br><span style="font-size:.78rem;color:#aaa;">' +
                d.category +
                " · Strengths: " +
                d.strengths +
                "</span>" +
                "</div>",
            )
            .join("");
        }
        dd.style.display = "block";
      }

      function highlightMatch(text, query) {
        const idx = text.toLowerCase().indexOf(query);
        if (idx < 0) return text;
        return (
          text.substring(0, idx) +
          '<span style="background:#fffde7;text-decoration:underline;">' +
          text.substring(idx, idx + query.length) +
          "</span>" +
          text.substring(idx + query.length)
        );
      }

      function selectDrug(name) {
        const input = document.getElementById("drug-search");
        if (input) input.value = name;
        const dd = document.getElementById("drug-dropdown");
        if (dd) dd.style.display = "none";
      }

      // Close dropdown on outside click
      document.addEventListener("click", function (e) {
        const dd = document.getElementById("drug-dropdown");
        const input = document.getElementById("drug-search");
        if (
          dd &&
          input &&
          !input.contains(e.target) &&
          !dd.contains(e.target)
        ) {
          dd.style.display = "none";
        }
      });
    </script>
  </body>
</html>
