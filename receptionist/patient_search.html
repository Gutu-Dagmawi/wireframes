<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DocuMed — Patient Search & List</title>
    <link rel="stylesheet" href="../wireframe.css" />
    <script src="../wireframe.js"></script>
  </head>
  <body>
    <script>
      ready(() => {
        renderPageShell({
          title: "Patient Search & List",
          role: "receptionist",
          activeId: "patient_search",
          screenId: "SCR_patient_search",
          workflow: "Patient Card Activation / Creation Flow",
          userName: "Hana G. (Receptionist)",
          content: `
      <h2 class="page-title">Patient Search & List</h2>

      <!-- Search Bar -->
      <div class="wf-card" style="margin-bottom:16px;">
        <div class="wf-form-row">
          ${renderFormField("Full Name", "text", { placeholder: "Patient name..." })}
          ${renderFormField("Phone Number", "text", { placeholder: "09..." })}
          ${renderFormField("National ID", "text", { placeholder: "ID number..." })}
          ${renderFormField("Date of Birth", "date")}
        </div>
        <div class="wf-action-bar" style="margin-top:10px;">
          <button class="wf-btn primary">🔍 Search</button>
          <button class="wf-btn">Clear</button>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="wf-action-bar between">
        <span class="text-muted text-small">Showing 5 patients</span>
        <a href="patient_registration.html"><button class="wf-btn">📝 Register Patient</button></a>
      </div>

      <!-- Results Table -->
      ${renderTable(
        [
          "Full Name",
          "Sex",
          "Date of Birth",
          "Phone",
          "National ID",
          "Last Visit",
          "Status",
        ],
        [
          [
            "<strong>Abebe Kebede</strong>",
            "M",
            "12/03/1985",
            "0911-234-567",
            "ET-1234567",
            "02/04/2026",
            '<span class="wf-badge green">Active</span>',
          ],
          [
            "<strong>Fatima Ali</strong>",
            "F",
            "25/08/1990",
            "0922-345-678",
            "ET-2345678",
            "28/03/2026",
            '<span class="wf-badge gray">Not activated</span>',
          ],
          [
            "<strong>Dawit Tadesse</strong>",
            "M",
            "07/11/1978",
            "0933-456-789",
            "ET-3456789",
            "15/03/2026",
            '<span class="wf-badge gray">Not activated</span>',
          ],
          [
            "<strong>Meron Hailu</strong>",
            "F",
            "19/06/1995",
            "0944-567-890",
            "ET-4567890",
            "01/04/2026",
            '<span class="wf-badge blue">In Queue</span>',
          ],
          [
            "<strong>Yonas Gebre</strong>",
            "M",
            "03/02/2001",
            "0955-678-901",
            "ET-5678901",
            "—",
            '<span class="wf-badge gray">Not activated</span>',
          ],
        ],
        { clickable: true },
      )}

      <!-- Inline Card Activation Panel (shown when a patient row is selected) -->
      <div class="wf-inline-panel">
        <h3 style="margin-bottom:10px;">Card Activation — Fatima Ali</h3>
        <div class="wf-kv-grid">
          <div class="wf-kv"><div class="kv-label">Patient</div><div class="kv-value">Fatima Ali</div></div>
          <div class="wf-kv"><div class="kv-label">Sex / Age</div><div class="kv-value">Female, 35 yrs</div></div>
          <div class="wf-kv"><div class="kv-label">Phone</div><div class="kv-value">0922-345-678</div></div>
          <div class="wf-kv"><div class="kv-label">Last Visit</div><div class="kv-value">28 Mar 2026</div></div>
        </div>
        <div class="wf-form-row" style="max-width:500px;">
          ${renderFormField("Select Practitioner", "select", {
            required: true,
            options: [
              "— Select —",
              "Dr. Solomon T. (General Practice) — 3 in queue",
              "Dr. Miriam K. (Paediatrics) — 1 in queue",
              "Dr. Alem B. (Internal Medicine) — 5 in queue",
            ],
          })}
        </div>
        <div class="wf-action-bar" style="margin-top:10px;">
          <button class="wf-btn primary">✓ Activate Card</button>
          <span class="text-small text-muted">→ Creates payment request in Finance queue</span>
        </div>
      </div>
    `,
        });
      });
    </script>
  </body>
</html>
