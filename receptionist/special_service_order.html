<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DocuMed — Special Service Order</title>
    <link rel="stylesheet" href="../wireframe.css" />
    <script src="../wireframe.js"></script>
  </head>
  <body>
    <script>
      ready(() => {
        renderPageShell({
          title: "Special Service Order",
          role: "receptionist",
          activeId: "special_service",
          screenId: "SCR_special_service_order",
          workflow: "Special Service Order Flow",
          userName: "Hana G. (Receptionist)",
          content: `
      <h2 class="page-title">Special Service Order</h2>
      <p class="text-small text-muted mb-2">Order walk-in services that do not require a doctor's consultation. Can be in-house or externally prescribed (from another clinic). Flow: Receptionist → Finance → Nurse (and/or Lab Tech). External orders require nurse validation.</p>

      <!-- Patient Selection -->
      <div class="wf-form-section">
        <div class="section-title">1. Select Patient</div>
        <div class="wf-form-row" style="max-width:700px;">
          ${renderFormField("Search Patient <span class='required'>*</span>", "text", { required: true, placeholder: "Search by Name, MRN, Phone, or National ID..." })}
        </div>
        <!-- Selected patient card -->
        <div class="wf-card" style="margin-top:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;">
          <div class="wf-placeholder" style="width:40px;height:40px;border-radius:50%;font-size:.5rem;display:flex;align-items:center;justify-content:center;">Foto</div>
          <div>
            <strong>Fatima Ali</strong> (MRN-0078) &mdash; F, 35 yrs &mdash; 0922-345-678
            <div class="text-small text-muted">Known allergies: None known</div>
          </div>
          <button class="wf-btn small" style="margin-left:auto;">Change Patient</button>
        </div>
      </div>

      <!-- Order Source -->
      <div class="wf-form-section">
        <div class="section-title">1b. Order Source</div>
        <div style="display:flex;gap:12px;margin-bottom:8px;">
          <label style="display:flex;align-items:center;gap:6px;padding:8px 16px;border:2px solid #eee;border-radius:4px;cursor:pointer;font-size:.88rem;">
            <input type="radio" name="source" value="inhouse" checked onchange="document.getElementById('external-fields').style.display='none'"> <strong>In-house</strong>
          </label>
          <label style="display:flex;align-items:center;gap:6px;padding:8px 16px;border:2px solid #1565c0;border-radius:4px;cursor:pointer;font-size:.88rem;background:#e3f2fd;">
            <input type="radio" name="source" value="external" onchange="document.getElementById('external-fields').style.display='block'"> <strong>External</strong> (prescribed by another clinic)
          </label>
        </div>

        <!-- External fields (shown when External selected) -->
        <div id="external-fields" style="display:block;margin-top:8px;padding:12px;background:#f8fbff;border-radius:4px;border:1px solid #bbdefb;">
          <div class="wf-grid-2">
            <div>
              ${renderFormField("Referring Clinic <span class='required'>*</span>", "text", { required: true, placeholder: "e.g., St. Gabriel Hospital" })}
              ${renderFormField("Referring Doctor", "text", { placeholder: "e.g., Dr. Meseret A." })}
            </div>
            <div>
              <div class="wf-form-group">
                <label>Upload Prescription (PDF / Image) <span class="required">*</span></label>
                <div class="wf-placeholder" style="height:70px;display:flex;align-items:center;justify-content:center;font-size:.8rem;background:#fff;border:2px dashed #90caf9;border-radius:4px;cursor:pointer;">
                  📎 Click to upload or drag & drop (PDF, JPG, PNG — max 10MB)
                </div>
              </div>
              ${renderFormField("Receptionist Notes", "textarea", { placeholder: "e.g., Patient brought printed prescription. Drug provided by patient." })}
            </div>
          </div>
          <p class="text-small text-muted" style="margin-top:4px;">External orders require <strong>nurse validation</strong> before administration. The uploaded prescription will be reviewed in the Nurse's External Orders queue.</p>
        </div>
      </div>

      <!-- Service Selection -->
      <div class="wf-form-section">
        <div class="section-title">2. Select Services</div>
        <p class="text-small text-muted" style="margin-top:-4px;margin-bottom:8px;">Only walk-in special services available at this branch are shown. Select one or more.</p>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <!-- BP Check -->
          <label class="wf-card" style="padding:12px;cursor:pointer;display:flex;gap:8px;align-items:flex-start;">
            <input type="checkbox" checked style="margin-top:4px;">
            <div>
              <div style="font-weight:600;">Blood Pressure Check</div>
              <div class="text-small text-muted">BP-CHK &mdash; Screening</div>
              <div style="font-family:'Architects Daughter',cursive;font-size:1rem;color:#333;">ETB 50.00</div>
            </div>
          </label>
          <!-- Blood Sugar -->
          <label class="wf-card" style="padding:12px;cursor:pointer;display:flex;gap:8px;align-items:flex-start;">
            <input type="checkbox" checked style="margin-top:4px;">
            <div>
              <div style="font-weight:600;">Blood Sugar Check</div>
              <div class="text-small text-muted">BS-CHK &mdash; Screening</div>
              <div style="font-family:'Architects Daughter',cursive;font-size:1rem;color:#333;">ETB 100.00</div>
              <span class="wf-badge blue" style="font-size:.55rem;margin-top:4px;">Auto-creates Lab: FBS</span>
            </div>
          </label>
          <!-- BMI -->
          <label class="wf-card" style="padding:12px;cursor:pointer;display:flex;gap:8px;align-items:flex-start;">
            <input type="checkbox" style="margin-top:4px;">
            <div>
              <div style="font-weight:600;">BMI Measurement</div>
              <div class="text-small text-muted">BMI &mdash; Screening</div>
              <div style="font-family:'Architects Daughter',cursive;font-size:1rem;color:#333;">ETB 30.00</div>
            </div>
          </label>
          <!-- Pregnancy Test -->
          <label class="wf-card" style="padding:12px;cursor:pointer;display:flex;gap:8px;align-items:flex-start;">
            <input type="checkbox" style="margin-top:4px;">
            <div>
              <div style="font-weight:600;">Pregnancy Test</div>
              <div class="text-small text-muted">PREG-TST &mdash; Screening</div>
              <div style="font-family:'Architects Daughter',cursive;font-size:1rem;color:#333;">ETB 150.00</div>
              <span class="wf-badge blue" style="font-size:.55rem;margin-top:4px;">Auto-creates Lab: HCG</span>
            </div>
          </label>
          <!-- Injection Own Drug -->
          <label class="wf-card" style="padding:12px;cursor:pointer;display:flex;gap:8px;align-items:flex-start;">
            <input type="checkbox" style="margin-top:4px;">
            <div>
              <div style="font-weight:600;">Injection (Patient Drug)</div>
              <div class="text-small text-muted">INJ-OWN &mdash; Injections</div>
              <div style="font-family:'Architects Daughter',cursive;font-size:1rem;color:#333;">ETB 80.00</div>
            </div>
          </label>
          <!-- Wound Dressing Walk-In -->
          <label class="wf-card" style="padding:12px;cursor:pointer;display:flex;gap:8px;align-items:flex-start;">
            <input type="checkbox" style="margin-top:4px;">
            <div>
              <div style="font-weight:600;">Wound Dressing (Walk-In)</div>
              <div class="text-small text-muted">WND-WI &mdash; Wound Care</div>
              <div style="font-family:'Architects Daughter',cursive;font-size:1rem;color:#333;">ETB 150.00</div>
            </div>
          </label>
        </div>
      </div>

      <!-- Recurrence Configuration (shown when recurrence-eligible service selected) -->
      <div class="wf-form-section" id="recurrence-config" style="border-left:3px solid #1565c0;background:#f8fbff;">
        <div class="section-title" style="color:#1565c0;">🔄 Recurring Service Configuration</div>
        <p class="text-small text-muted" style="margin-top:-6px;margin-bottom:8px;">The selected service <strong>Wound Dressing (Walk-In)</strong> is <strong>recurrence eligible</strong>. Configure a recurring series or leave unchecked for a single session.</p>
        <div class="wf-form-group">
          <label><input type="checkbox" checked> Enable Recurring Series</label>
        </div>
        <div class="wf-grid-2" style="margin-top:6px;">
          <div>
            ${renderFormField("Schedule Type", "select", { options: ["Daily", "Custom days (Mon/Wed/Fri)", "Every other day"] })}
            ${renderFormField("Total Sessions <span class='required'>*</span>", "number", { required: true, placeholder: "5" })}
          </div>
          <div>
            ${renderFormField("Start Date", "date", { required: true })}
            <div class="wf-form-group">
              <label>End Date (auto-calculated)</label>
              <input class="wf-input" type="text" value="26 Apr 2026" disabled style="background:#f5f5f5;">
            </div>
            ${renderFormField("Time Preference", "select", { options: ["Morning", "Afternoon", "No Preference"] })}
          </div>
        </div>
        <p class="text-small text-muted">Payment is collected <strong>upfront</strong> for all sessions. The recurring series will appear on the <strong>Recurring Services Tracker</strong> calendar. Per-session check-in routes to the Nurse queue without additional payment.</p>
      </div>

      <!-- Notes -->
      <div class="wf-form-section">
        <div class="section-title">3. Notes for Nurse</div>
        ${renderFormField("Instructions", "textarea", { placeholder: "Any instructions for the nurse (optional). e.g., 'Patient is fasting for FBS'" })}
      </div>

      <!-- Order Summary -->
      <div class="wf-form-section">
        <div class="section-title flex-between">
          <span>Order Summary</span>
          <span class="wf-badge" style="background:#e3f2fd;color:#1565c0;">Source: External — St. Gabriel Hospital</span>
        </div>
        ${renderTable(
          [
            "#",
            "Service",
            "Code",
            "Sessions",
            "Unit Price (ETB)",
            "Linked Lab",
            "Subtotal (ETB)",
          ],
          [
            ["1", "Blood Pressure Check", "BP-CHK", "1", "50.00", "—", "50.00"],
            [
              "2",
              "Blood Sugar Check",
              "BS-CHK",
              "1",
              "100.00",
              '<span class="wf-badge blue" style="font-size:.55rem;">FBS → Lab Tech Queue</span>',
              "100.00",
            ],
            [
              "3",
              '<strong>Wound Dressing (Walk-In)</strong> <span class="wf-badge" style="font-size:.5rem;background:#e3f2fd;color:#1565c0;">Recurring</span>',
              "WND-WI",
              "<strong>5</strong>",
              "150.00",
              "—",
              "<strong>750.00</strong>",
            ],
          ],
        )}
        <div style="display:flex;justify-content:flex-end;padding:8px 12px;">
          <div style="text-align:right;">
            <div class="text-small text-muted">Price from: Branch Config (Main Branch)</div>
            <div style="font-family:'Architects Daughter',cursive;font-size:1.8rem;color:#222;margin-top:4px;">Total: ETB 900.00</div>
            <div class="text-small text-muted">Includes 5-session recurring series (ETB 750.00 upfront)</div>
          </div>
        </div>
      </div>

      <hr class="wf-divider">

      <div class="wf-action-bar">
        <button class="wf-btn primary" onclick="showSuccess()">Submit Order</button>
        <a href="today_dashboard.html"><button class="wf-btn">Cancel</button></a>
      </div>

      <!-- Success -->
      <div class="wf-inline-panel" id="order-success" style="display:none;margin-top:16px;background:#e8f5e9;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:1.5rem;color:#2e7d32;">&#10003;</div>
          <div>
            <div style="font-weight:600;color:#2e7d32;">Special service order submitted</div>
            <div class="text-small" style="color:#555;">
              Payment request (ETB 150.00) sent to Finance queue.<br>
              Lab order (FBS) auto-created and sent to Lab Tech queue.<br>
              Nurse order (BP Check) sent to Nurse queue.<br>
              All orders activate after Finance confirms payment.
            </div>
          </div>
        </div>
        <div class="wf-action-bar" style="margin-top:10px;">
          <a href="today_dashboard.html"><button class="wf-btn primary">Back to Dashboard</button></a>
          <button class="wf-btn" onclick="window.print()">Print Order Summary</button>
        </div>
      </div>
    `,
        });

        window.showSuccess = function () {
          document.getElementById("order-success").style.display = "block";
          document
            .getElementById("order-success")
            .scrollIntoView({ behavior: "smooth" });
        };
      });
    </script>
  </body>
</html>
